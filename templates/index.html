<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocoyitoTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #111111;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e5e5e5;
        }

        .tab {
            background: none;
            border: none;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            color: #111;
            border-bottom: 2px solid #111;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d4d4d4;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fff;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #111;
        }

        button {
            background: #111;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            margin-top: 1.5rem;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .video-item {
            display: flex;
            gap: 1rem;
            padding: 0.75rem;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .video-item:hover {
            background: #fafafa;
        }

        .video-item img {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
        }

        .video-item .info {
            flex: 1;
        }

        .video-item .title {
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .video-item .meta {
            font-size: 0.75rem;
            color: #999;
        }

        .download-panel {
            background: #fafafa;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .row select {
            flex: 1;
            min-width: 110px;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .success {
            background: #e6f4ea;
            color: #137333;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PocoyitoTube</h1>
        <div class="subtitle">Descarga audio de YouTube con efectos de onda</div>

        <div class="tabs">
            <button class="tab active" data-tab="search">🔍 Buscar</button>
            <button class="tab" data-tab="url">🔗 Enlace directo</button>
        </div>

        <div id="search-tab" class="tab-content active">
            <div class="input-group">
                <input type="text" id="search-input" placeholder="Ej: Feid, Bad Bunny, Rock argentino..." 
                       onkeypress="if(event.key==='Enter') buscar()">
            </div>
            <button onclick="buscar()">Buscar</button>
            <div id="search-results"></div>
        </div>

        <div id="url-tab" class="tab-content">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..."
                       onkeypress="if(event.key==='Enter') obtenerInfo()">
            </div>
            <button onclick="obtenerInfo()">Analizar</button>
            <div id="url-results"></div>
        </div>
    </div>

    <script>
        let videoUrl = '';
        let videoTitle = '';

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
                // Limpiar resultados al cambiar de tab
                const container = tab.dataset.tab === 'search' ? 'search-results' : 'url-results';
                document.getElementById(container).innerHTML = '';
            });
        });

        async function buscar() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) {
                mostrarError('search-results', '✏️ Escribe algo para buscar');
                return;
            }
            
            mostrarLoading('search-results');
            
            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                
                if (data.success && data.videos && data.videos.length) {
                    mostrarVideos(data.videos);
                } else {
                    mostrarError('search-results', data.error || '❌ No se encontraron videos');
                }
            } catch (e) {
                mostrarError('search-results', '❌ Error de conexión con el servidor');
            }
        }

        function mostrarVideos(videos) {
            const html = `
                <div class="video-list">
                    ${videos.map(v => `
                        <div class="video-item" onclick="seleccionarVideo('${v.url}', '${escapeHtml(v.title)}')">
                            <img src="${v.thumbnail}" alt="" onerror="this.src='https://placehold.co/80x45/eee/999?text=No+img'">
                            <div class="info">
                                <div class="title">${escapeHtml(v.title)}</div>
                                <div class="meta">${escapeHtml(v.uploader)} • ${formatDuration(v.duration)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('search-results').innerHTML = html;
        }

        async function obtenerInfo() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) {
                mostrarError('url-results', '✏️ Ingresa una URL de YouTube');
                return;
            }
            
            mostrarLoading('url-results');
            
            try {
                const res = await fetch('/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                
                if (data.success) {
                    seleccionarVideo(url, data.title);
                } else {
                    mostrarError('url-results', data.error || '❌ No se pudo obtener información del video');
                }
            } catch (e) {
                mostrarError('url-results', '❌ Error de conexión con el servidor');
            }
        }

        function seleccionarVideo(url, title) {
            videoUrl = url;
            videoTitle = title;
            
            const container = document.getElementById(getActiveContainer());
            container.innerHTML = `
                <div class="download-panel">
                    <div style="font-weight: 500; margin-bottom: 0.75rem; word-break: break-word;">📥 ${escapeHtml(title)}</div>
                    <div class="row">
                        <select id="formato-select">
                            <option value="mp3">MP3</option>
                            <option value="flac">FLAC</option>
                            <option value="wav">WAV</option>
                            <option value="ogg">OGG</option>
                            <option value="m4a">M4A</option>
                            <option value="aac">AAC</option>
                            <option value="opus">OPUS</option>
                        </select>
                        <select id="calidad-select">
                            <option value="320">320 kbps</option>
                            <option value="256">256 kbps</option>
                            <option value="192" selected>192 kbps</option>
                            <option value="128">128 kbps</option>
                        </select>
                        <select id="efecto-select">
                            <option value="normal">Normal</option>
                            <option value="radio">Radio AM</option>
                            <option value="telefono">Teléfono</option>
                            <option value="lofi">LoFi</option>
                        </select>
                    </div>
                    <button onclick="descargar()" style="width: 100%;">⬇️ Descargar</button>
                </div>
            `;
        }

        async function descargar() {
            if (!videoUrl) {
                mostrarError(getActiveContainer(), '❌ No hay video seleccionado');
                return;
            }
            
            const formato = document.getElementById('formato-select').value;
            const calidad = document.getElementById('calidad-select').value;
            const efecto = document.getElementById('efecto-select').value;
            
            const btn = document.querySelector('.download-panel button');
            if (btn) btn.disabled = true;
            
            mostrarLoading(getActiveContainer());
            
            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: videoUrl, formato, calidad, efecto })
                });
                const data = await res.json();
                
                if (data.success) {
                    mostrarExito(getActiveContainer(), `✅ Descargado: ${data.title}`);
                    // Descargar archivo
                    window.location.href = `/download_file/${data.filename}`;
                    // Limpiar después de 5 segundos
                    setTimeout(() => {
                        document.getElementById(getActiveContainer()).innerHTML = '';
                        videoUrl = '';
                    }, 5000);
                } else {
                    mostrarError(getActiveContainer(), data.error || '❌ Error al descargar');
                    if (btn) btn.disabled = false;
                }
            } catch (e) {
                mostrarError(getActiveContainer(), '❌ Error de conexión con el servidor');
                if (btn) btn.disabled = false;
            }
        }

        function getActiveContainer() {
            return document.getElementById('search-tab').classList.contains('active') 
                ? 'search-results' : 'url-results';
        }

        function mostrarLoading(id) {
            document.getElementById(id).innerHTML = '<div class="loading">⏳ Cargando...</div>';
        }

        function mostrarError(id, msg) {
            document.getElementById(id).innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
        }

        function mostrarExito(id, msg) {
            const el = document.getElementById(id);
            const div = document.createElement('div');
            div.className = 'success';
            div.innerHTML = escapeHtml(msg);
            const existing = el.querySelector('.success');
            if (existing) existing.remove();
            el.insertBefore(div, el.firstChild);
        }

        function formatDuration(sec) {
            if (!sec || sec <= 0) return 'Live';
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s.toString().padStart(2,'0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
