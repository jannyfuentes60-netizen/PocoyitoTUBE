<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocoyitoTube - Descargador con Onda Cambiada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3.5em;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: 600;
            color: #eee;
        }

        .tab.active {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4ecdc4;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            font-size: 1em;
            color: #fff;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(0,0,0,0.5);
        }

        button {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78,205,196,0.3);
        }

        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .video-thumbnail {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .video-details {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #4ecdc4;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(78,205,196,0.2);
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
        }

        .form-group {
            margin-bottom: 15px;
        }

        select {
            cursor: pointer;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: rgba(78,205,196,0.2);
            border-radius: 20px;
            font-size: 0.8em;
            margin: 2px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .grid-2cols { grid-template-columns: 1fr; }
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 PocoyitoTube</h1>
            <p>Descarga con TODOS los formatos y cambia la ONDA del audio</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 Buscar videos</button>
            <button class="tab" onclick="switchTab('url')">🔗 Enlace directo</button>
        </div>

        <!-- Pestaña de búsqueda -->
        <div id="search-tab" class="tab-content active">
            <div class="card">
                <div class="input-group">
                    <label>🔎 Buscar en YouTube</label>
                    <input type="text" id="search-query" placeholder="Artista, canción, video..." 
                           onkeypress="if(event.key==='Enter') searchVideos()">
                </div>
                <button onclick="searchVideos()">Buscar</button>
                <div id="search-results" class="results"></div>
            </div>
        </div>

        <!-- Pestaña de enlace directo -->
        <div id="url-tab" class="tab-content">
            <div class="card">
                <div class="input-group">
                    <label>🔗 URL de YouTube</label>
                    <input type="text" id="video-url" placeholder="https://youtube.com/watch?v=..." 
                           onkeypress="if(event.key==='Enter') getVideoInfo()">
                </div>
                <button onclick="getVideoInfo()">Obtener info</button>
                <div id="url-results" class="results"></div>
            </div>
        </div>
    </div>

    <script>
        let currentVideoUrl = '';
        let currentVideoTitle = '';

        // Cargar formatos al inicio
        let formatosAudio = {};
        let formatosVideo = {};
        let efectosOnda = {};

        async function cargarFormatos() {
            try {
                const response = await fetch('/api/formatos');
                const data = await response.json();
                formatosAudio = data.audio;
                formatosVideo = data.video;
                efectosOnda = data.efectos;
            } catch(e) {
                console.error('Error cargando formatos:', e);
            }
        }
        cargarFormatos();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'search') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('search-tab').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('url-tab').classList.add('active');
            }
        }

        async function searchVideos() {
            const query = document.getElementById('search-query').value.trim();
            if (!query) {
                showError('search-results', 'Escribe algo para buscar');
                return;
            }

            showLoading('search-results');
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: query})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displaySearchResults(data.videos);
                } else {
                    showError('search-results', data.error || 'Error en búsqueda');
                }
            } catch (error) {
                showError('search-results', 'Error de conexión');
            }
        }

        function displaySearchResults(videos) {
            const container = document.getElementById('search-results');
            
            if (!videos || videos.length === 0) {
                container.innerHTML = '<div class="alert alert-error">No se encontraron videos</div>';
                return;
            }
            
            const html = `
                <h3>🎥 Resultados (${videos.length})</h3>
                <div class="video-grid">
                    ${videos.map(video => `
                        <div class="video-card" onclick="seleccionarVideo('${video.url}', '${escapeHtml(video.title)}')">
                            <img class="video-thumbnail" src="${video.thumbnail}" alt="${escapeHtml(video.title)}">
                            <div class="video-info">
                                <div class="video-title">${escapeHtml(video.title)}</div>
                                <div class="video-details">${video.uploader} • ${formatDuration(video.duration)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            container.innerHTML = html;
        }

        function seleccionarVideo(url, title) {
            currentVideoUrl = url;
            currentVideoTitle = title;
            mostrarPanelDescarga();
        }

        async function getVideoInfo() {
            const url = document.getElementById('video-url').value.trim();
            if (!url) {
                showError('url-results', 'Ingresa una URL');
                return;
            }
            
            showLoading('url-results');
            
            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentVideoUrl = url;
                    currentVideoTitle = data.title;
                    mostrarPanelDescarga(true, data);
                } else {
                    showError('url-results', data.error || 'Error');
                }
            } catch (error) {
                showError('url-results', 'Error de conexión');
            }
        }

        function mostrarPanelDescarga(conInfo = false, info = null) {
            const container = document.getElementById(getActiveContainer());
            
            // Generar selects de formatos dinámicamente
            let audioOptions = '';
            for (const [key, val] of Object.entries(formatosAudio)) {
                audioOptions += `<option value="${key}">${val.emoji} ${val.nombre}</option>`;
            }
            
            let videoOptions = '';
            for (const [key, val] of Object.entries(formatosVideo)) {
                videoOptions += `<option value="${key}">${val.emoji} ${val.nombre}</option>`;
            }
            
            let efectosOptions = '';
            for (const [key, val] of Object.entries(efectosOnda)) {
                efectosOptions += `<option value="${key}">${val.nombre}</option>`;
            }
            
            const infoHtml = conInfo && info ? `
                <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                    <h3>${escapeHtml(info.title)}</h3>
                    <p>📺 ${info.uploader} • ⏱️ ${formatDuration(info.duration)} • 👁️ ${formatNumber(info.views)} vistas</p>
                    ${info.thumbnail ? `<img src="${info.thumbnail}" style="max-width: 200px; border-radius: 10px;">` : ''}
                </div>
            ` : `<h3>📥 Descargar: ${escapeHtml(currentVideoTitle)}</h3>`;
            
            const html = `
                ${infoHtml}
                
                <div class="grid-2cols">
                    <div class="form-group">
                        <label>🎵 FORMATO DE AUDIO</label>
                        <select id="formato-audio-select" onchange="cambiarTipo('audio')">
                            ${audioOptions}
                        </select>
                        <div id="calidad-audio-container" class="form-group" style="margin-top: 10px;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>📹 FORMATO DE VIDEO</label>
                        <select id="formato-video-select" onchange="cambiarTipo('video')">
                            ${videoOptions}
                        </select>
                        <div id="calidad-video-container" class="form-group" style="margin-top: 10px;"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🌊 EFECTO DE ONDA CAMBIADA</label>
                    <select id="efecto-select">
                        ${efectosOptions}
                    </select>
                    <small style="opacity:0.7; display:block; margin-top:5px;">✨ Cambia la frecuencia de muestreo - Altera la "onda" sin filtros</small>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="descargar('audio')">🎵 Descargar Audio</button>
                    <button onclick="descargar('video')">📹 Descargar Video</button>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Cargar calidades iniciales
            cambiarTipo('audio');
            cambiarTipo('video');
        }
        
        function cambiarTipo(tipo) {
            if (tipo === 'audio') {
                const select = document.getElementById('formato-audio-select');
                const formatoKey = select.value;
                const formato = formatosAudio[formatoKey];
                
                if (formato) {
                    let calidadHtml = '<label>📊 Calidad:</label><select id="calidad-audio">';
                    for (const [qual, val] of Object.entries(formato.calidades)) {
                        calidadHtml += `<option value="${qual}">${qual}</option>`;
                    }
                    calidadHtml += '</select>';
                    document.getElementById('calidad-audio-container').innerHTML = calidadHtml;
                }
            } else {
                const select = document.getElementById('formato-video-select');
                const formatoKey = select.value;
                const formato = formatosVideo[formatoKey];
                
                if (formato) {
                    let calidadHtml = '<label>📊 Calidad:</label><select id="calidad-video">';
                    for (const [qual, val] of Object.entries(formato.calidades)) {
                        calidadHtml += `<option value="${qual}">${qual}</option>`;
                    }
                    calidadHtml += '</select>';
                    document.getElementById('calidad-video-container').innerHTML = calidadHtml;
                }
            }
        }
        
        async function descargar(tipo) {
            let formatoNombre, calidad;
            
            if (tipo === 'audio') {
                formatoNombre = document.getElementById('formato-audio-select').value;
                calidad = document.getElementById('calidad-audio').value;
            } else {
                formatoNombre = document.getElementById('formato-video-select').value;
                calidad = document.getElementById('calidad-video').value;
            }
            
            const efecto = document.getElementById('efecto-select').value;
            
            showLoading(getActiveContainer());
            
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url: currentVideoUrl,
                        formato_tipo: tipo,
                        formato_nombre: formatoNombre,
                        calidad: calidad,
                        efecto: efecto
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess(getActiveContainer(), `✅ ¡Descargado! ${data.title} [${data.efecto_usado}]`);
                    window.location.href = `/api/download_file/${data.filename}`;
                } else {
                    showError(getActiveContainer(), data.error || 'Error en descarga');
                }
            } catch (error) {
                showError(getActiveContainer(), 'Error de conexión');
            }
        }

        function getActiveContainer() {
            return document.getElementById('search-tab').classList.contains('active') ? 'search-results' : 'url-results';
        }

        function showLoading(containerId) {
            document.getElementById(containerId).innerHTML = '<div class="loading">⏳ Procesando...</div>';
        }

        function showError(containerId, message) {
            document.getElementById(containerId).innerHTML = `<div class="alert alert-error">❌ ${escapeHtml(message)}</div>`;
        }

        function showSuccess(containerId, message) {
            const container = document.getElementById(containerId);
            const successDiv = document.createElement('div');
            successDiv.className = 'alert alert-success';
            successDiv.innerHTML = `✅ ${escapeHtml(message)}`;
            container.insertBefore(successDiv, container.firstChild);
            setTimeout(() => successDiv.remove(), 5000);
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) return `${hours}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            return `${minutes}:${secs.toString().padStart(2,'0')}`;
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
